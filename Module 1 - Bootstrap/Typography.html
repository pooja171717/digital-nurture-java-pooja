<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Typography Utilities</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-4">

        <h1 class="display-1">
            Display Heading
        </h1>

        <p class="lead">
            This is a lead paragraph.
        </p>

        <p class="text-muted">
            This text is muted.
        </p>

        <p class="fw-bold">
            This text is bold.
        </p>

    </div>

</body>
</html>
