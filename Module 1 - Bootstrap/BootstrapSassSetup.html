<!DOCTYPE html>

    <title>Bootstrap Sass Setup</title>
</head>
<body>

    <h2>Bootstrap 5 with Sass</h2>

    <p>Install Bootstrap using npm.</p>

    <pre>

npm init -y

npm install bootstrap

npm install sass

Create:
scss/custom.scss

Import Bootstrap:

@import "../node_modules/bootstrap/scss/bootstrap";

Compile:

sass scss/custom.scss css/custom.css

    </pre>
