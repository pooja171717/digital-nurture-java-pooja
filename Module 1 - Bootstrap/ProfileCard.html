<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Profile Card</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <div class="card"
             style="width: 18rem;">

            <img src="profile.jpg"
                 class="card-img-top"
                 alt="Profile Image">

            <div class="card-body">

                <h5 class="card-title">
                    John Doe
                </h5>

                <p class="card-text">
                    Web Developer
                </p>

                <a href="#"
                   class="btn btn-primary">
                   View Profile
                </a>

            </div>

        </div>

    </div>

</body>
</html>
