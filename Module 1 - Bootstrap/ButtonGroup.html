<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Button Group</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-4">

        <div class="btn-group">

            <button class="btn btn-primary">
                Left
            </button>

            <button class="btn btn-primary">
                Middle
            </button>

            <button class="btn btn-primary">
                Right
            </button>

        </div>

        <div class="mt-3">

            <input type="checkbox"
                   class="btn-check"
                   id="check1">

            <label class="btn btn-outline-success"
                   for="check1">
                Toggle Button
            </label>

        </div>

    </div>

</body>
</html>
