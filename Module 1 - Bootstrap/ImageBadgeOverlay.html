<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Badge Overlay</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <div class="position-relative
                    d-inline-block">

            <img src="product.jpg"
                 width="250"
                 alt="Product">

            <span class="badge
                         bg-danger
                         position-absolute
                         top-0
                         start-100
                         translate-middle">

                New

            </span>

        </div>

    </div>

</body>
</html>
