<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Login Form</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <div class="form-floating mb-3">

            <input type="email"
                   class="form-control"
                   id="email">

            <label for="email">
                Email Address
            </label>

        </div>

        <div class="form-floating mb-3">

            <input type="password"
                   class="form-control"
                   id="password">

            <label for="password">
                Password
            </label>

        </div>

        <button class="btn btn-success">
            Login
        </button>

    </div>

</body>
</html>
