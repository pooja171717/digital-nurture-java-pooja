<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Column Reordering</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-4">

        <div class="row">

            <div class="col-md-6
                        order-md-2
                        bg-primary
                        text-white p-3">

                First Column

            </div>

            <div class="col-md-6
                        order-md-1
                        bg-warning p-3">

                Second Column

            </div>

        </div>

    </div>

</body>
</html>
